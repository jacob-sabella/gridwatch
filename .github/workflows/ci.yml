name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          check-latest: true
          cache: true

      - name: Download deps
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race ./...

      - name: Build
        run: go build -trimpath -o gridwatch ./cmd/gridwatch

      - name: Smoke test (demo mode)
        run: |
          ./gridwatch --version
          cat > /tmp/smoke.yaml <<EOF
          contact: "ci@example.com"
          games:
            - rocketleague
          bind: "127.0.0.1:8081"
          EOF
          ./gridwatch --config /tmp/smoke.yaml --demo &
          PID=$!
          trap "kill $PID 2>/dev/null || true" EXIT
          for i in 1 2 3 4 5; do
            if curl -sf http://127.0.0.1:8081/readyz > /dev/null; then break; fi
            sleep 0.5
          done
          curl -sf http://127.0.0.1:8081/readyz
          curl -sf http://127.0.0.1:8081/api/v1/matches | head -c 200
          curl -sf http://127.0.0.1:8081/api/v1/matches.ics | head -c 200
          curl -sf http://127.0.0.1:8081/api/v1/matches.xml | head -c 200

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ghcr.io/jacob-sabella/gridwatch:ci
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}
