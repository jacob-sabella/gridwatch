name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Belt-and-suspenders: run weekly in case a secret lands via a merge
    # we forgot to gate.
    - cron: "0 6 * * 1"

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so TruffleHog can scan every commit, not just the
          # tip. Catches secrets introduced in old commits and never removed.
          fetch-depth: 0
          persist-credentials: false

      # On pull_request: diff from base → head (fast).
      # On push / schedule / manual: scan the whole history (thorough).
      - name: TruffleHog (PR diff)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.ref }}
          head: HEAD
          extra_args: --results=verified,unknown

      - name: TruffleHog (full history)
        if: github.event_name != 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown

  gitleaks:
    name: Gitleaks (second opinion)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
