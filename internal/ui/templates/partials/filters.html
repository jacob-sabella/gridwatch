<form class="filters"
      hx-get="{{joinURL .BaseURL "/partial/grid"}}"
      hx-target="#view"
      hx-push-url="true"
      hx-trigger="change">
  <h3>Filters</h3>

  <fieldset>
    <legend>Games</legend>
    {{$selected := .Filters.Games}}
    {{range .AllGames}}
    {{$slug := .Slug}}
    <label>
      <input type="checkbox" name="game" value="{{.Slug}}"
             {{range $selected}}{{if eq . $slug}}checked{{end}}{{end}}>
      <span class="dot" style="background:{{.Color}}"></span>
      {{.Display}}
    </label>
    {{end}}
  </fieldset>

  <fieldset>
    <legend>Stream</legend>
    <label>
      <input type="checkbox" name="has_stream" value="1" {{if .Filters.HasStream}}checked{{end}}>
      Only matches with a stream
    </label>
  </fieldset>
</form>

<!-- sidebar-stats moved into grid.html so SSE/htmx partial refreshes
     update the counters. When they lived here, the sidebar only
     re-rendered on full page load and stats went stale after the
     first background poll. -->
